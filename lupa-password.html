<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lupa Password</title>
    <link rel="stylesheet" href="style/output.css" />
  </head>
  <body>
    <h2>Lupa Password</h2>

    <form id="forgotForm">
      <!--Email-->
      <label>Masukkan Email:</label><br />
      <input type="text" id="email" /><br /><br />

      <!-- Password Baru -->
      <label>Password Baru:</label><br />
      <input type="password" id="newPassword" /><br /><br />

      <!-- Konfirmasi Password -->
      <label>Konfirmasi Password:</label><br />
      <input type="password" id="confirmPassword" /><br /><br />

      <!--Error-->
      <p id="errorMsg" style="color: red; display: none"></p>

      <!--Success-->
      <p id="successMsg" style="color: green; display: none"></p>

      <button type="submit">Kirim</button>
    </form>

    <br />

    <a href="login.html">Kembali ke Halaman Login</a>

    <script>
      const form = document.getElementById("forgotForm");
      const errorMsg = document.getElementById("errorMsg");

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword =
          document.getElementById("confirmPassword").value;

        if (email === "" || newPassword === "" || confirmPassword === "") {
          errorMsg.innerText = "Semua field wajib diisi!";
          errorMsg.style.display = "block";
        } else if (newPassword !== confirmPassword) {
          errorMsg.innerText = "Password tidak sama!";
          errorMsg.style.display = "block";
        } else {
          errorMsg.style.display = "none";

          alert("Password berhasil diubah");
          window.location.href = "login.html";
        }
      });
    </script>
  </body>
</html>
